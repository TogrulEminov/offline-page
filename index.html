<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kometa.ge - Tezliklə Xidmətinizdə</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(
          135deg,
          #0a0e27 0%,
          #1a237e 50%,
          #0d47a1 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        overflow-x: hidden;
        position: relative;
      }

      /* Arxa plan animasiyası */
      .bg-animation {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
      }

      .bg-animation::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px
        );
        background-size: 50px 50px;
        animation: moveGrid 20s linear infinite;
      }

      @keyframes moveGrid {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(50px, 50px);
        }
      }

      .floating-shapes {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .shape {
        position: absolute;
        opacity: 0.1;
        animation: float 20s infinite ease-in-out;
      }

      .shape:nth-child(1) {
        width: 80px;
        height: 80px;
        background: #42a5f5;
        border-radius: 50%;
        top: 20%;
        left: 10%;
        animation-delay: 0s;
      }

      .shape:nth-child(2) {
        width: 120px;
        height: 120px;
        background: #1e88e5;
        border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        top: 60%;
        right: 10%;
        animation-delay: 5s;
      }

      .shape:nth-child(3) {
        width: 60px;
        height: 60px;
        background: #64b5f6;
        transform: rotate(45deg);
        bottom: 20%;
        left: 20%;
        animation-delay: 10s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-30px) rotate(180deg);
        }
      }

      .container {
        text-align: center;
        z-index: 1;
        padding: 40px 20px;
        max-width: 800px;
        width: 100%;
      }

      /* Logo bölməsi */
      .logo-section {
        margin-bottom: 50px;
        animation: fadeInDown 1s ease-out;
      }

      .logo-icon {
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, #1976d2 0%, #0d47a1 100%);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 30px;
        box-shadow:
          0 20px 60px rgba(13, 71, 161, 0.4),
          inset 0 2px 4px rgba(255, 255, 255, 0.2);
        position: relative;
        overflow: hidden;
      }

      .logo-icon::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        transform: rotate(45deg);
        animation: shimmer 3s infinite;
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-100%) translateY(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(100%) translateY(100%) rotate(45deg);
        }
      }

      .logo-icon svg {
        width: 50px;
        height: 50px;
        fill: white;
        position: relative;
        z-index: 1;
      }

      .company-name {
        font-size: 4rem;
        font-weight: 800;
        letter-spacing: -2px;
        margin-bottom: 15px;
        background: linear-gradient(to right, #ffffff, #90caf9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 10px 30px rgba(13, 71, 161, 0.3);
      }

      .tagline {
        font-size: 1.3rem;
        color: #90caf9;
        font-weight: 300;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Ana mətn */
      .main-content {
        margin: 60px 0;
        animation: fadeInUp 1s ease-out 0.3s both;
      }

      .coming-soon {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 20px;
        color: #fff;
        position: relative;
        display: inline-block;
      }

      .coming-soon::after {
        content: "";
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, #42a5f5, #1976d2);
        border-radius: 2px;
      }

      .description {
        font-size: 1.2rem;
        color: #bbdefb;
        line-height: 1.8;
        max-width: 600px;
        margin: 30px auto 0;
      }

      .highlight {
        color: #42a5f5;
        font-weight: 600;
      }

      /* Əlaqə kartları */
      .contact-section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin: 50px 0;
        animation: fadeInUp 1s ease-out 0.6s both;
      }

      .contact-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 25px;
        display: flex;
        align-items: center;
        gap: 15px;
        transition: all 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        color: white;
      }

      .contact-card:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        border-color: rgba(66, 165, 245, 0.3);
      }

      .contact-icon {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #1976d2, #0d47a1);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 4px 15px rgba(13, 71, 161, 0.3);
      }

      .contact-icon svg {
        width: 24px;
        height: 24px;
        fill: white;
      }

      .contact-info {
        text-align: left;
      }

      .contact-label {
        font-size: 0.85rem;
        color: #90caf9;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
      }

      .contact-value {
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
      }

      /* Sosial media */
      .social-section {
        margin-top: 50px;
        animation: fadeInUp 1s ease-out 0.9s both;
      }

      .social-title {
        font-size: 0.9rem;
        color: #90caf9;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .social-links {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .social-link {
        width: 55px;
        height: 55px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        text-decoration: none;
        position: relative;
        overflow: hidden;
      }

      .social-link::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, var(--hover-color), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .social-link:hover {
        transform: translateY(-5px) scale(1.1);
        border-color: var(--hover-color);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .social-link:hover::before {
        opacity: 0.2;
      }

      .social-link svg {
        width: 24px;
        height: 24px;
        fill: white;
        position: relative;
        z-index: 1;
        transition: transform 0.3s ease;
      }

      .social-link:hover svg {
        transform: scale(1.1);
      }

      .social-link.instagram {
        --hover-color: #e4405f;
      }
      .social-link.whatsapp {
        --hover-color: #25d366;
      }
      .social-link.linkedin {
        --hover-color: #0a66c2;
      }

      /* Footer */
      .footer {
        margin-top: 60px;
        padding-top: 30px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        animation: fadeIn 1s ease-out 1.2s both;
      }

      .footer-text {
        color: #64b5f6;
        font-size: 0.9rem;
      }

      .location {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
        color: #90caf9;
        font-size: 0.85rem;
      }

      /* Animations */
      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .company-name {
          font-size: 2.5rem;
        }

        .coming-soon {
          font-size: 1.8rem;
        }

        .contact-section {
          grid-template-columns: 1fr;
        }

        .logo-icon {
          width: 80px;
          height: 80px;
        }

        .logo-icon svg {
          width: 40px;
          height: 40px;
        }
      }

      /* Loading animation for page */
      .loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0e27;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
      }

      .loader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loader-circle {
        width: 60px;
        height: 60px;
        border: 3px solid rgba(25, 118, 210, 0.3);
        border-top-color: #1976d2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

            width="16"

            fill="none"
            stroke="currentColor"

          >

    <script>
      // Hide loader when page loads
      window.addEventListener("load", function () {
        setTimeout(function () {
          document.getElementById("loader").classList.add("hidden");
        }, 500);
      });

      // Add hover sound effect (optional - subtle)
      const cards = document.querySelectorAll(".contact-card, .social-link");
      cards.forEach((card) => {
        card.addEventListener("mouseenter", function () {
          this.style.transform = "translateY(-5px)";
        });
      });

      // Parallax effect for floating shapes
      document.addEventListener("mousemove", (e) => {
        const shapes = document.querySelectorAll(".shape");
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;

        shapes.forEach((shape, index) => {
          const speed = (index + 1) * 20;
          shape.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
        });
      });
    </script>
  </body>
</html>
