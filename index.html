<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kometa.ge - Coming Soon | International Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle background texture */
        .bg-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: 
                linear-gradient(45deg, #333 25%, transparent 25%), 
                linear-gradient(-45deg, #333 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #333 75%), 
                linear-gradient(-45deg, transparent 75%, #333 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 60px 40px;
            max-width: 1000px;
            width: 100%;
        }

        /* Logo Section - Minimal */
        .logo-section {
            margin-bottom: 60px;
            animation: fadeIn 1s ease-out;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 25px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: #1a1a1a;
            border: 2px solid #5c1a1a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-cross {
            font-size: 32px;
            color: #8b3a3a;
        }

        .company-name {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: #d0d0d0;
            text-transform: uppercase;
        }

        .company-name span {
            color: #8b3a3a;
            font-weight: 700;
        }

        .tagline {
            font-size: 0.85rem;
            color: #666;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* Main Content */
        .main-content {
            margin: 50px 0;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .coming-soon {
            font-size: 1.1rem;
            font-weight: 500;
            color: #8b3a3a;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 20px;
            padding: 12px 30px;
            border: 1px solid #3a1a1a;
            display: inline-block;
            background: #151515;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #888;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Services Grid - Dark Professional */
        .services-section {
            margin: 60px 0;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 40px 0;
        }

        .service-card {
            background: #161616;
            border: 1px solid #252525;
            border-radius: 8px;
            padding: 35px 20px;
            transition: all 0.3s ease;
            cursor: default;
        }

        .service-card:hover {
            background: #1a1a1a;
            border-color: #3a1a1a;
            transform: translateY(-3px);
        }

        .service-icon {
            font-size: 1.8rem;
            color: #5c1a1a;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .service-card:hover .service-icon {
            color: #8b3a3a;
        }

        .service-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #b0b0b0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .service-desc {
            font-size: 0.75rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Delivery Message */
        .delivery-message {
            border-top: 1px solid #252525;
            border-bottom: 1px solid #252525;
            padding: 25px;
            margin: 40px auto;
            max-width: 500px;
        }

        .delivery-message i {
            font-size: 1.2rem;
            color: #5c1a1a;
            margin-bottom: 10px;
        }

        .delivery-message span {
            display: block;
            font-size: 0.95rem;
            color: #777;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Contact Section - Minimal */
        .contact-section {
            margin: 50px 0;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .contact-card {
            background: #161616;
            border: 1px solid #252525;
            border-radius: 8px;
            padding: 25px 50px;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #e0e0e0;
        }

        .contact-card:hover {
            background: #1a1a1a;
            border-color: #3a1a1a;
        }

        .contact-icon-main {
            width: 45px;
            height: 45px;
            background: #1f1f1f;
            border: 1px solid #3a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #8b3a3a;
        }

        .contact-info {
            text-align: left;
        }

        .contact-label {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .contact-value {
            font-size: 1.4rem;
            font-weight: 600;
            color: #c0c0c0;
            letter-spacing: 1px;
        }

        /* Social Media - Minimal */
        .social-section {
            margin-top: 50px;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .social-title {
            font-size: 0.7rem;
            color: #555;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            background: #161616;
            border: 1px solid #252525;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #666;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-link:hover {
            background: #1a1a1a;
            border-color: #3a1a1a;
            color: #8b3a3a;
            transform: translateY(-2px);
        }

        /* Footer */
        .footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #1f1f1f;
            animation: fadeIn 1s ease-out 1s both;
        }

        .footer-text {
            color: #444;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .location {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #555;
            font-size: 0.8rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }
            
            .company-name {
                font-size: 2rem;
            }
            
            .services-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .contact-value {
                font-size: 1.1rem;
            }
            
            .coming-soon {
                font-size: 0.9rem;
                letter-spacing: 3px;
            }
        }

        @media (max-width: 480px) {
            .services-grid {
                grid-template-columns: 1fr;
            }
            
            .logo-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .contact-card {
                flex-direction: column;
                text-align: center;
                padding: 20px 30px;
            }
            
            .contact-info {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-texture"></div>

    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-plus logo-cross"></i>
                </div>
                <div>
                    <h1 class="company-name">KOMETA<span>.GE</span></h1>
                    <p class="tagline">International Logistics</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="coming-soon">Coming Soon</div>
            <p class="subtitle">Multimodal International Transportation</p>
        </div>

        <!-- Services Section -->
        <div class="services-section">
            <div class="services-grid">
                <div class="service-card">
                    <div class="service-icon">
                        <i class="fas fa-truck"></i>
                    </div>
                    <div class="service-name">Road</div>
                    <div class="service-desc">Ground Transport</div>
                </div>
                <div class="service-card">
                    <div class="service-icon">
                        <i class="fas fa-plane"></i>
                    </div>
                    <div class="service-name">Air</div>
                    <div class="service-desc">Air Freight</div>
                </div>
                <div class="service-card">
                    <div class="service-icon">
                        <i class="fas fa-ship"></i>
                    </div>
                    <div class="service-name">Sea</div>
                    <div class="service-desc">Ocean Cargo</div>
                </div>
                <div class="service-card">
                    <div class="service-icon">
                        <i class="fas fa-train"></i>
                    </div>
                    <div class="service-name">Rail</div>
                    <div class="service-desc">Rail Transport</div>
                </div>
            </div>

            <div class="delivery-message">
                <i class="fas fa-box-open"></i>
                <span>Delivery to all destinations</span>
            </div>
        </div>

        <!-- Contact Section -->
        <div class="contact-section">
            <a href="tel:+994102223999" class="contact-card">
                <div class="contact-icon-main">
                    <i class="fas fa-phone-alt"></i>
                </div>
                <div class="contact-info">
                    <div class="contact-label">Contact</div>
                    <div class="contact-value">+994 10 222 39 99</div>
                </div>
            </a>
        </div>

        <!-- Social Media -->
        <div class="social-section">
            <p class="social-title">Follow Us</p>
            <div class="social-links">
                <a href="https://instagram.com/kometa.ge" target="_blank" class="social-link" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://wa.me/994102223999" target="_blank" class="social-link" aria-label="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <a href="https://linkedin.com/company/kometa-ge" target="_blank" class="social-link" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p class="footer-text">© 2024 Kometa.ge — All Rights Reserved</p>
            <div class="location">
                <i class="fas fa-map-marker-alt"></i>
                <span>Georgia, Tbilisi</span>
            </div>
        </div>
    </div>
</body>
</html>
